<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taskflow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f8f7ff; --bg3: #f1f0f9;
    --text: #1a1a2e; --text2: #4b5070; --text3: #9490b0;
    --border: rgba(139,92,246,0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0f0f1a; --bg2:#16162a; --bg3:#1e1e35; --text:#e9d5ff; --text2:#a89fc0; --text3:#5a5475; --border:rgba(139,92,246,0.2); }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; }
  .app { display: flex; width: 100%; max-width: 1100px; min-height: calc(100vh - 48px); border-radius: 18px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 8px 40px rgba(139,92,246,0.08); }
  /* Sidebar */
  .sidebar { width: 220px; flex-shrink: 0; background: linear-gradient(160deg,#1e0a2e,#0f172a); display: flex; flex-direction: column; padding: 24px 0 0; }
  .logo { font-size: 16px; font-weight: 500; color: #e9d5ff; padding: 0 18px 18px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 16px; display: flex; align-items: center; gap: 9px; }
  .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: linear-gradient(135deg,#f472b6,#818cf8); flex-shrink: 0; }
  .sec-label { font-size: 10px; font-weight: 500; color: rgba(200,180,255,0.4); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 18px; margin-bottom: 6px; }
  .proj-btn { display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; padding: 9px 18px; font-size: 13px; border: none; cursor: pointer; background: transparent; color: rgba(200,180,255,0.6); border-left: 2px solid transparent; transition: all 0.15s; }
  .proj-btn:hover { color: #e9d5ff; background: rgba(255,255,255,0.05); }
  .proj-btn.active { color: #e9d5ff; background: rgba(255,255,255,0.08); border-left-color: var(--pc); }
  .proj-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pc); flex-shrink: 0; }
  .proj-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .proj-count { font-size: 11px; background: rgba(255,255,255,0.1); color: rgba(200,180,255,0.7); border-radius: 99px; padding: 1px 7px; }
  .add-proj-btn { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; padding: 9px 18px; font-size: 13px; border: none; cursor: pointer; background: transparent; color: rgba(200,180,255,0.4); }
  .add-proj-btn:hover { color: #c084fc; }
  .new-proj-form { padding: 8px 14px; }
  .new-proj-form input { width: 100%; font-size: 13px; padding: 7px 10px; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; background: rgba(255,255,255,0.08); color: #e9d5ff; outline: none; margin-bottom: 8px; }
  .new-proj-form input::placeholder { color: rgba(200,180,255,0.35); }
  .color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .swatch { width: 19px; height: 19px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: border-color 0.1s; }
  .swatch.sel { border-color: #fff; }
  .form-btns { display: flex; gap: 6px; }
  .form-add { flex: 1; padding: 6px; font-size: 12px; border: none; border-radius: 7px; background: linear-gradient(135deg,#818cf8,#c084fc); color: #fff; cursor: pointer; }
  .form-cancel { padding: 6px 10px; font-size: 12px; border: none; border-radius: 7px; background: rgba(255,255,255,0.08); color: rgba(200,180,255,0.6); cursor: pointer; }
  .sidebar-foot { margin-top: auto; padding: 10px 18px 18px; font-size: 11px; color: rgba(200,180,255,0.3); text-align: center; border-top: 1px solid rgba(255,255,255,0.06); }
  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; background: var(--bg); min-width: 0; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 1px solid var(--border); }
  .proj-title { font-size: 17px; font-weight: 500; color: var(--text); flex: 1; display: flex; align-items: center; gap: 9px; }
  .title-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--pc); flex-shrink: 0; }
  .pct-badge { font-size: 12px; padding: 4px 12px; border-radius: 99px; background: #F5F3FF; color: #6D28D9; font-weight: 500; }
  .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 14px; }
  .stat-card { border-radius: 13px; padding: 13px 16px; }
  .sc-p { background: #F5F3FF; } .sc-b { background: #EFF6FF; } .sc-k { background: #FDF2F8; }
  .stat-val { font-size: 26px; font-weight: 500; }
  .sc-p .stat-val { color: #6D28D9; } .sc-b .stat-val { color: #1D4ED8; } .sc-k .stat-val { color: #9D174D; }
  .stat-lbl { font-size: 12px; margin-top: 3px; }
  .sc-p .stat-lbl { color: #7C3AED; } .sc-b .stat-lbl { color: #2563EB; } .sc-k .stat-lbl { color: #BE185D; }
  .prog-track { height: 5px; border-radius: 99px; background: rgba(139,92,246,0.1); margin-bottom: 18px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#818cf8,#c084fc,#f472b6); transition: width 0.4s; }
  .add-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .task-input { flex: 2; min-width: 140px; font-size: 13px; padding: 9px 13px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg2); color: var(--text); outline: none; }
  .task-input:focus { border-color: #a78bfa; }
  .due-input { flex: 1; min-width: 130px; font-size: 13px; padding: 9px 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg2); color: var(--text); outline: none; }
  .due-input:focus { border-color: #a78bfa; }
  .pri-sel { font-size: 13px; padding: 9px 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg2); color: var(--text); outline: none; }
  .add-btn { padding: 9px 20px; font-size: 13px; border: none; border-radius: 10px; background: linear-gradient(135deg,#818cf8,#c084fc); color: #fff; cursor: pointer; font-weight: 500; }
  .group-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); margin-bottom: 8px; }
  .task-card { display: flex; align-items: center; gap: 9px; padding: 10px 14px; border-radius: 12px; margin-bottom: 7px; border: 1px solid var(--border); background: var(--bg); transition: border-color 0.15s, opacity 0.15s, box-shadow 0.15s; cursor: grab; }
  .task-card:hover { border-color: rgba(192,132,252,0.35); }
  .task-card.drag-over { border-color: #818cf8; box-shadow: 0 0 0 2px rgba(129,140,248,0.2); }
  .task-card.dragging { opacity: 0.35; }
  .drag-handle { color: rgba(139,92,246,0.25); font-size: 15px; cursor: grab; flex-shrink: 0; user-select: none; }
  .status-btn { background: none; border: none; cursor: pointer; font-size: 18px; flex-shrink: 0; padding: 0; line-height: 1; }
  .s-todo { color: rgba(139,92,246,0.25); } .s-ip { color: #818cf8; } .s-done { color: #f472b6; }
  .task-title { flex: 1; font-size: 14px; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-title.done { text-decoration: line-through; color: var(--text3); }
  .due-badge { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  .pri-badge { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 99px; flex-shrink: 0; }
  .status-sel { font-size: 11px; padding: 3px 7px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; outline: none; flex-shrink: 0; }
  .del-btn { background: none; border: none; cursor: pointer; color: rgba(139,92,246,0.2); font-size: 15px; padding: 2px; flex-shrink: 0; }
  .del-btn:hover { color: #f472b6; }
  .empty { text-align: center; color: var(--text3); font-size: 14px; padding: 60px 0; }
  .no-proj { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--text3); padding: 60px; text-align: center; }
  .no-proj p { font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo"><span class="logo-dot"></span>Taskflow</div>
    <p class="sec-label">Projects</p>
    <div id="proj-list"></div>
    <div id="new-proj-area">
      <button class="add-proj-btn" onclick="showNewProj()">+ New project</button>
    </div>
    <div class="sidebar-foot">✦ auto-saved</div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar" id="topbar">
      <div class="proj-title" id="proj-title">Select a project</div>
      <span class="pct-badge" id="pct-badge" style="display:none"></span>
    </div>
    <div class="content" id="content">
      <div class="no-proj">
        <div style="font-size:36px">✦</div>
        <p>Create a project in the sidebar to get started.</p>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = ["#C084FC","#818CF8","#60A5FA","#F472B6","#A78BFA","#38BDF8"];
const PRI = {
  low:    {bg:"#EDE9FE",text:"#6D28D9"},
  medium: {bg:"#EFF6FF",text:"#1D4ED8"},
  high:   {bg:"#FDF2F8",text:"#9D174D"},
};
const ST_NEXT  = {todo:"in-progress","in-progress":"done",done:"todo"};
const ST_ICON  = {todo:"○","in-progress":"◑",done:"●"};
const ST_LBL   = {todo:"To do","in-progress":"In progress",done:"Done"};
const ST_STYLE = {
  todo:          {bg:"#F5F3FF",text:"#6D28D9"},
  "in-progress": {bg:"#EFF6FF",text:"#1D4ED8"},
  done:          {bg:"#FDF2F8",text:"#9D174D"},
};

const KEY = "taskflow-v1";
let state = load();
let active = state.projects[0]?.id || null;
let dragging = null;
let newProjColor = COLORS[0];

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {projects:[],tasks:[]}; }
  catch { return {projects:[],tasks:[]}; }
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
function genId() { return Math.random().toString(36).slice(2,9); }

function formatDue(str) {
  if (!str) return null;
  const d = new Date(str + "T00:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  const label = diff < 0 ? Math.abs(diff)+"d overdue" : diff===0?"Today":diff===1?"Tomorrow":diff+"d";
  const color = diff < 0 ? "#9D174D" : diff<=1 ? "#854F0B" : "#4B5563";
  const bg    = diff < 0 ? "#FDF2F8" : diff<=1 ? "#FAEEDA" : "#F3F4F6";
  return {label,color,bg};
}

function render() {
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const list = document.getElementById("proj-list");
  list.innerHTML = state.projects.map(p => {
    const count = state.tasks.filter(t=>t.projectId===p.id).length;
    const cls = p.id===active?"proj-btn active":"proj-btn";
    return `<button class="${cls}" style="--pc:${p.color}" onclick="selectProject('${p.id}')">
      <span class="proj-dot"></span>
      <span class="proj-name">${esc(p.name)}</span>
      <span class="proj-count">${count}</span>
    </button>`;
  }).join("");
}

function renderMain() {
  const proj = state.projects.find(p=>p.id===active);
  if (!proj) {
    document.getElementById("proj-title").textContent = "Select a project";
    document.getElementById("pct-badge").style.display = "none";
    document.getElementById("content").innerHTML = `<div class="no-proj"><div style="font-size:36px">✦</div><p>Create a project in the sidebar to get started.</p></div>`;
    return;
  }
  const tasks = state.tasks.filter(t=>t.projectId===active).sort((a,b)=>a.order-b.order);
  const done  = tasks.filter(t=>t.status==="done").length;
  const pct   = tasks.length ? Math.round(done/tasks.length*100) : 0;

  document.getElementById("proj-title").innerHTML = `<span class="title-dot" style="--pc:${proj.color}"></span>${esc(proj.name)}`;
  const badge = document.getElementById("pct-badge");
  badge.style.display = "";
  badge.textContent = pct+"% done";

  const groups = ["in-progress","todo","done"].map(st => {
    const grp = tasks.filter(t=>t.status===st);
    if (!grp.length) return "";
    return `<div style="margin-bottom:18px">
      <div class="group-label">${ST_LBL[st]}</div>
      ${grp.map(t => {
        const due = formatDue(t.due);
        const dueBadge = due ? `<span class="due-badge" style="background:${due.bg};color:${due.color}">${due.label}</span>` : "";
        return `<div class="task-card" id="tc-${t.id}" draggable="true"
          ondragstart="onDragStart(event,'${t.id}')"
          ondragover="onDragOver(event,'${t.id}')"
          ondrop="onDrop(event,'${t.id}')"
          ondragend="onDragEnd()">
          <span class="drag-handle">⠿</span>
          <button class="status-btn s-${st==='in-progress'?'ip':st}" onclick="cycleStatus('${t.id}')">${ST_ICON[t.status]}</button>
          <span class="task-title${t.status==='done'?' done':''}" title="${esc(t.title)}">${esc(t.title)}</span>
          ${dueBadge}
          <span class="pri-badge" style="background:${PRI[t.priority].bg};color:${PRI[t.priority].text}">${t.priority}</span>
          <select class="status-sel" style="background:${ST_STYLE[t.status].bg};color:${ST_STYLE[t.status].text}" onchange="updateStatus('${t.id}',this.value)">
            <option value="todo"${t.status==="todo"?" selected":""}>To do</option>
            <option value="in-progress"${t.status==="in-progress"?" selected":""}>In progress</option>
            <option value="done"${t.status==="done"?" selected":""}>Done</option>
          </select>
          <button class="del-btn" onclick="deleteTask('${t.id}')">✕</button>
        </div>`;
      }).join("")}
    </div>`;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div class="stats">
      <div class="stat-card sc-p"><div class="stat-val">${tasks.length}</div><div class="stat-lbl">Total</div></div>
      <div class="stat-card sc-b"><div class="stat-val">${tasks.filter(t=>t.status==="in-progress").length}</div><div class="stat-lbl">In progress</div></div>
      <div class="stat-card sc-k"><div class="stat-val">${done}</div><div class="stat-lbl">Done</div></div>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="add-row">
      <input class="task-input" id="task-input" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()" />
      <input class="due-input" id="due-input" type="date" title="Due date" />
      <select class="pri-sel" id="pri-sel">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button class="add-btn" onclick="addTask()">Add</button>
    </div>
    ${groups || '<div class="empty">No tasks yet — add one above.</div>'}
  `;
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function selectProject(id) { active = id; render(); }

function showNewProj() {
  newProjColor = COLORS[0];
  document.getElementById("new-proj-area").innerHTML = `
    <div class="new-proj-form">
      <input id="np-input" placeholder="Project name…" onkeydown="if(event.key==='Enter')addProject()" autofocus />
      <div class="color-row">${COLORS.map(c=>`<div class="swatch${c===newProjColor?" sel":""}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join("")}</div>
      <div class="form-btns">
        <button class="form-add" onclick="addProject()">Add</button>
        <button class="form-cancel" onclick="cancelNewProj()">Cancel</button>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById("np-input")?.focus(),50);
}

function pickColor(c, el) {
  newProjColor = c;
  document.querySelectorAll(".swatch").forEach(s=>s.classList.remove("sel"));
  el.classList.add("sel");
}

function cancelNewProj() {
  document.getElementById("new-proj-area").innerHTML = `<button class="add-proj-btn" onclick="showNewProj()">+ New project</button>`;
}

function addProject() {
  const name = document.getElementById("np-input")?.value?.trim();
  if (!name) return;
  const id = genId();
  state.projects.push({id, name, color: newProjColor});
  save(); active = id;
  cancelNewProj();
  render();
}

function addTask() {
  const title = document.getElementById("task-input")?.value?.trim();
  if (!title) return;
  const due = document.getElementById("due-input")?.value || "";
  const priority = document.getElementById("pri-sel")?.value || "medium";
  const maxOrder = state.tasks.filter(t=>t.projectId===active).reduce((m,t)=>Math.max(m,t.order),-1)+1;
  state.tasks.push({id:genId(), projectId:active, title, priority, status:"todo", due, order:maxOrder});
  save(); render();
}

function cycleStatus(id) {
  const t = state.tasks.find(t=>t.id===id);
  if (t) { t.status = ST_NEXT[t.status]; save(); render(); }
}

function updateStatus(id, val) {
  const t = state.tasks.find(t=>t.id===id);
  if (t) { t.status = val; save(); render(); }
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t=>t.id!==id);
  save(); render();
}

function onDragStart(e, id) { dragging = id; e.dataTransfer.effectAllowed = "move"; setTimeout(()=>{ const el=document.getElementById("tc-"+id); if(el) el.classList.add("dragging"); },0); }
function onDragOver(e, id)  { e.preventDefault(); if (dragging!==id) { document.querySelectorAll(".task-card").forEach(el=>el.classList.remove("drag-over")); const el=document.getElementById("tc-"+id); if(el) el.classList.add("drag-over"); } }
function onDrop(e, targetId) {
  e.preventDefault();
  if (!dragging || dragging===targetId) { onDragEnd(); return; }
  const projTasks = state.tasks.filter(t=>t.projectId===active).sort((a,b)=>a.order-b.order);
  const si = projTasks.findIndex(t=>t.id===dragging);
  const ti = projTasks.findIndex(t=>t.id===targetId);
  const [moved] = projTasks.splice(si,1);
  projTasks.splice(ti,0,moved);
  projTasks.forEach((t,i)=>{ const x=state.tasks.find(x=>x.id===t.id); if(x) x.order=i; });
  dragging = null; save(); render();
}
function onDragEnd() { dragging=null; document.querySelectorAll(".task-card").forEach(el=>{ el.classList.remove("dragging","drag-over"); }); }

render();
</script>
</body>
</html>
